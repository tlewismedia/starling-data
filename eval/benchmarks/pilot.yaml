- query: "Where can we hold customer securities and still meet the possession-or-control requirement under Rule 15c3-3?"
  category: Spanning
  expected_chunk_ids:
    - "17-CFR-240.15c3-3::(b)::p0"
  keywords:
    - "fully-paid"
    - "excess-margin"
    - "clearing corporation"
    - "DTC"
    - "bank"
    - "vault"
  reference_answer: |
    Under SEC Rule 15c3-3(b), a broker-dealer must promptly obtain and
    maintain physical possession or control of all fully-paid and excess-
    margin customer securities. Recognized control locations include a
    clearing corporation such as DTC, a bank acting as custodian, the
    broker-dealer's own vault, a Commission-recognized foreign depository
    or clearing agency, or other Commission-approved locations.
  notes: "Spanning. Definition of possession/control plus the enumerated set of acceptable locations."

- query: "Under the Customer Reserve Formula, how do we figure out the required deposit and what are we actually depositing?"
  category: Numerical
  expected_chunk_ids:
    - "17-CFR-240.15c3-3a::240.15c3-3a-customer-reserve-formula."
  keywords:
    - "net credit balance"
    - "credits exceed debits"
    - "cash or qualified securities"
    - "Special Reserve Bank Account"
  reference_answer: |
    Under SEC Rule 15c3-3a, the required reserve deposit equals the extent
    to which total customer credits exceed total customer debits — the
    "net credit balance." The broker-dealer must deposit cash or qualified
    securities equal to that excess in the Special Reserve Bank Account
    for the Exclusive Benefit of Customers on the prescribed deposit date
    following each computation.
  notes: "Numerical / definitional. Deposit mechanics for the customer-protection reserve."

- query: "What information has to be on the order memorandum we keep for every brokerage order, and what about block-order allocations?"
  category: Direct fact
  expected_chunk_ids:
    - "17-CFR-240.17a-3::(v)::p0"
  keywords:
    - "terms and conditions"
    - "time of receipt"
    - "time of execution"
    - "block"
    - "post-execution"
  reference_answer: |
    Under SEC Rule 17a-3(a)(6), the order memorandum must show the terms
    and conditions of the order, the account it was entered for, the time
    of receipt, and the time of execution or cancellation, with receipt
    treated as entry time for market orders and as identical to execution
    for orders executed on receipt. Post-execution allocations of block
    orders must also be documented.
  notes: "Direct fact. The chunker landed item (a)(6) in the (v)::p0 chunk because (a)(6)/(7)/etc share a frame with item 4(v)."

- query: "Can we use ordinary editable electronic storage for our books and records, or do we need write-once media?"
  category: Comparative
  expected_chunk_ids:
    - "17-CFR-240.17a-4::(f)::p0"
  keywords:
    - "WORM"
    - "audit-trail"
    - "time-stamped"
    - "original record"
    - "2022"
  reference_answer: |
    Under SEC Rule 17a-4(f), a broker-dealer may preserve required records
    electronically using either traditional WORM (write-once, read-many)
    media or, since the 2022 amendments, an audit-trail alternative under
    which editable storage is acceptable provided the system maintains a
    complete time-stamped audit trail of every modification, preserves the
    original record, and enforces appropriate access controls.
  notes: "Comparative. WORM vs. audit-trail alternative — two paths to the same compliance outcome."

- query: "How does the aggregation-unit framework change whether a broker-dealer is treated as owning a security for short-sale purposes?"
  category: Relationship
  expected_chunk_ids:
    - "17-CFR-242.200::(d)::p0"
    - "17-CFR-242.200::(f)::p0"
  keywords:
    - "net long"
    - "trading unit"
    - "independent"
    - "documented"
    - "objective"
  reference_answer: |
    Under Reg SHO Rule 200(c) and (d), a person owns a security only to the
    extent of a net-long position. A broker-dealer may treat aggregation
    units separately if each unit meets the conditions in paragraph (f) —
    namely, an identifiable trading objective, independent supervision,
    separately tracked positions, and documented organising policies —
    allowing ownership to be measured on a unit-by-unit basis rather than
    firm-wide.
  notes: "Relationship. Two paragraphs ((d) defines the unit, (f) sets conditions) that together change the short-sale ownership calculus."

- query: "What triggers the alternative uptick rule, and what does it actually restrict?"
  category: Direct fact
  expected_chunk_ids:
    - "17-CFR-242.201::242.201-price-test-restriction-alternative-uptick-rule-."
  keywords:
    - "10%"
    - "intraday"
    - "covered security"
    - "national best bid"
    - "next trading day"
  reference_answer: |
    Reg SHO Rule 201 triggers when a covered security (any NMS stock)
    declines 10% or more intraday from the prior day's closing price on
    the listing market. Once triggered, short-sale orders cannot be
    displayed or executed at a price at or below the current national
    best bid for the remainder of that trading day and the entirety of
    the next trading day.
  notes: "Direct fact. Two-part: trigger condition and the restriction itself."

- query: "Can we rely solely on Rule 605 statistics published by venues to satisfy FINRA Rule 5310's regular and rigorous review obligation?"
  category: Comparative
  expected_chunk_ids:
    - "17-CFR-242.605::interpretive-notes-rule-605-interaction-with-rule-5310"
  keywords:
    - "principal public data"
    - "not sufficient"
    - "own customer order flow"
    - "order types"
    - "aggregate"
  reference_answer: |
    No. Rule 605 statistics are the principal public data source members
    use for the regular and rigorous review under FINRA Rule 5310
    Supplementary Material .02, but they are not sufficient on their own.
    Members must independently evaluate routing decisions in the context
    of their own customer order flow, including order types and sizes that
    may not be represented proportionately in a venue's aggregate Rule 605
    report.
  notes: "Comparative. 605 alone vs. 605 + own-flow analysis — directly mirrors the AWC and Kestrel exam-letter findings."
