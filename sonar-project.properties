sonar.projectKey=starling-data
sonar.projectName=Starling Data
sonar.sourceEncoding=UTF-8

# Source directories
sonar.sources=app,pipeline,eval,ingest,corpus,scripts,shared
sonar.tests=tests

# TypeScript/JavaScript
sonar.language=ts
sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Raise embedded Node heap — the JS/TS analyzer OOMs at the default 4288 MB on this repo.
sonar.javascript.node.maxspace=8192

# Test inclusions (don't count as source)
sonar.test.inclusions=**/*.spec.ts,**/*.test.ts,**/*.spec.tsx,**/*.test.tsx

# Exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/.next/**,**/coverage/**,**/public/**,pnpm-lock.yaml,**/.scannerwork/**,**/test-results/**,**/.playwright-mcp/**
